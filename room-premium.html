<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">Lemon Tree Hotel</div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="room-deluxe.html">Deluxe</a></li>
        <li><a href="room-family.html">Family</a></li>
        <li><a href="room-premium.html">Premium</a></li>

      <ul>

        <li>Free Wi-Fi</li>
        <li>Private Balcony</li>

    <p>© 2026 Lemon Tree Hotel. All Rights Reserved.</p>
