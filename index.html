<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemon Tree Hotels - Premium Rooms</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar">
  <h2 class="logo">Lemon Tree Hotel</h2>

  <!-- ☰ Menu Button -->
  <div class="menu-btn">☰</div>

  <!-- Side Menu -->
  <div class="side-menu">
    <span class="close-btn">×</span>

    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="terms.html">Terms</a>

    <button class="book-btn">Book Now</button>
  </div>
</nav>

<!-- 🔥 HERO -->
<header class="hero">
  <h1>Lemon Tree Hotel</h1>
  <p>Luxury & Premium Rooms</p>
</header>

<section class="rooms-container">

  <div class="room-card">
    <img src="images/deluxe1.jpg">
    <div class="room-info">
      <h3>Deluxe Room</h3>
      <p>₹4500/night</p>
      <a href="room-deluxe.html" class="btn">View Details</a>
    </div>
  </div>

  <div class="room-card">
    <img src="images/premium1.jpg">
    <div class="room-info">
      <h3>Premium Room</h3>
      <p>₹6000/night</p>
      <a href="room-premium.html" class="btn">View Details</a>
    </div>
  </div>

  <div class="room-card">
    <img src="images/executive1.jpg">
    <div class="room-info">
      <h3>Executive Room</h3>
      <p>₹5000/night</p>
      <a href="room-executive.html" class="btn">View Details</a>
    </div>
  </div>

  <!-- बाकी same रहने दो -->

</section>

<!-- 🔥 BOOKING FORM -->
<div class="booking-form">
  <span class="close-form">×</span>

  <h2>Book Room</h2>

  <input type="date">
  <input type="date">

  <select>
    <option>Adults</option>
    <option>1</option>
    <option>2</option>
  </select>

  <select>
    <option>Children</option>
    <option>0</option>
    <option>1</option>
  </select>

  <select>
    <option>Select Room</option>
    <option>Deluxe Room</option>
    <option>Premium Room</option>
    <option>Executive Room</option>
    <option>Family Room</option>
    <option>Suite Room</option>
  </select>

  <button>Confirm Booking</button>
</div>

<!-- 🔥 JS CONNECT -->
<script src="script.js"></script>

</body>
</html>
