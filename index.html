<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemon Tree Hotel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar">
  <h2 class="logo">Lemon Tree Hotel</h2>
  <div class="menu-btn">☰</div>
</nav>

<!-- 🔥 HERO IMAGE -->
<section class="hero">
  <h1>Book Your Stay</h1>
  <p>Best Luxury Hotel Experience</p>
</section>

<!-- 🔥 BOOKING BAR -->
<div class="booking-bar">

  <input type="text" placeholder="Enter City">

  <input type="date">
  <input type="date">

  <select>
    <option>Adults</option>
    <option>1</option>
    <option>2</option>
  </select>

  <select>
    <option>Children</option>
    <option>0</option>
    <option>1</option>
  </select>

  <select>
    <option>Rooms</option>
    <option>Deluxe Room</option>
    <option>Premium Room</option>
    <option>Executive Room</option>
  </select>

  <button>Book Now</button>
</div>

<!-- 🔥 ROOMS -->
<section class="rooms-container">

  <div class="room-card">
    <img src="images/deluxe1.jpg">
    <h3>Deluxe Room</h3>
    <p>₹4500/night</p>
  </div>

  <div class="room-card">
    <img src="images/premium1.jpg">
    <h3>Premium Room</h3>
    <p>₹6000/night</p>
  </div>

  <div class="room-card">
    <img src="images/executive1.jpg">
    <h3>Executive Room</h3>
    <p>₹5000/night</p>
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
